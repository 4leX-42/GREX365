name: CI

on:
  push:
    branches: [main, grex365-2.0]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview
          include-prerelease: true

      - name: Restore Core
        run: dotnet restore src/Grex365.Core/Grex365.Core.csproj

      - name: Restore PowerShell
        run: dotnet restore src/Grex365.PowerShell/Grex365.PowerShell.csproj

      - name: Restore App
        run: dotnet restore src/Grex365.App/Grex365.App.csproj

      - name: Restore Tests
        run: dotnet restore tests/Grex365.Core.Tests/Grex365.Core.Tests.csproj

      - name: Build App (transitively builds Core + PowerShell)
        run: dotnet build src/Grex365.App/Grex365.App.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Grex365.Core.Tests/Grex365.Core.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview
          include-prerelease: true

      - name: Publish portable single-file EXE
        run: >
          dotnet publish src/Grex365.App/Grex365.App.csproj
          -c Release
          -p:PublishProfile=win-x64-portable
          -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grex365-${{ github.ref_name }}
          path: publish/Grex365.App.exe
